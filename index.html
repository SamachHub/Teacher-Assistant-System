<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ระบบผู้ช่วยคุณครู — โรงเรียนวันทามารีอา ราชบุรี</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --navy:#1B3A6B;
  --navy-dark:#122747;
  --navy-light:#2E5590;
  --gold:#C9A15A;
  --gold-light:#E8D8B0;
  --cream:#F7F3EA;
  --red:#B5342D;
  --red-light:#F3DCDA;
  --green:#3E7A4E;
  --green-light:#DCEEE1;
  --amber:#B8862E;
  --amber-light:#F3E6C8;
  --ink:#1F2430;
  --ink-soft:#5B6270;
  --line:#E4DECD;
  --card:#FFFFFF;
  --shadow: 0 1px 2px rgba(27,58,107,.06), 0 4px 16px rgba(27,58,107,.06);
  --radius: 14px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Sarabun',sans-serif;
  background:var(--cream);
  color:var(--ink);
  -webkit-tap-highlight-color: transparent;
}
h1,h2,h3,h4,.display{font-family:'Kanit',sans-serif;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}
#app{min-height:100vh;display:flex;flex-direction:column;}

/* ---------- Top bar ---------- */
.topbar{
  background:linear-gradient(135deg,var(--navy) 0%, var(--navy-dark) 100%);
  color:#fff;
  padding:14px 20px;
  display:flex;
  align-items:center;
  gap:14px;
  box-shadow:var(--shadow);
  position:sticky;top:0;z-index:50;
}
.topbar img{
  width:44px;height:44px;border-radius:50%;
  border:2px solid var(--gold);
  background:#fff;object-fit:cover;
  flex-shrink:0;
}
.topbar .titles{display:flex;flex-direction:column;line-height:1.25;min-width:0;}
.topbar .school{font-family:'Kanit',sans-serif;font-weight:600;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.topbar .sub{font-size:12px;color:var(--gold-light);}

/* ---------- Layout ---------- */
.shell{flex:1;display:flex;min-height:0;}
.sidenav{
  width:230px;background:#fff;border-right:1px solid var(--line);
  padding:16px 10px;flex-shrink:0;
}
.sidenav .navitem{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;border-radius:10px;color:var(--ink-soft);
  font-weight:500;font-size:15px;margin-bottom:4px;
  border:none;background:none;width:100%;text-align:right-ish;
  transition:background .15s;
}
.sidenav .navitem .ic{font-size:19px;width:24px;text-align:center;}
.sidenav .navitem:hover{background:var(--cream);}
.sidenav .navitem.active{background:var(--navy);color:#fff;}
.main{flex:1;min-width:0;padding:22px 26px 90px;overflow-y:auto;}

/* Bottom nav for mobile */
.bottomnav{
  display:none;position:fixed;bottom:0;left:0;right:0;
  background:#fff;border-top:1px solid var(--line);
  box-shadow:0 -2px 12px rgba(0,0,0,.06);
  z-index:50;
  padding-bottom:env(safe-area-inset-bottom);
}
.bottomnav-inner{display:flex;}
.bottomnav .navitem{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:8px 2px 10px;border:none;background:none;color:var(--ink-soft);
  font-size:11px;font-weight:500;
}
.bottomnav .navitem .ic{font-size:21px;}
.bottomnav .navitem.active{color:var(--navy);}
.bottomnav .navitem.active .ic{color:var(--navy);}

@media (max-width: 860px){
  .sidenav{display:none;}
  .bottomnav{display:block;}
  .main{padding:14px 12px 84px;}
  .topbar{padding:10px 14px;}
}

/* ---------- Common widgets ---------- */
.page-head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:18px;}
.page-head h1{font-size:22px;margin:0;color:var(--navy-dark);}
.page-head .desc{font-size:13px;color:var(--ink-soft);margin-top:2px;}

.card{
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:18px;box-shadow:var(--shadow);margin-bottom:16px;
}
.card h3{margin:0 0 12px;font-size:16px;color:var(--navy-dark);}

.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.field{display:flex;flex-direction:column;gap:4px;}
.field label{font-size:12px;color:var(--ink-soft);font-weight:600;}
select,.txt,input[type=text],input[type=number],input[type=date]{
  border:1px solid var(--line);border-radius:9px;padding:9px 12px;font-size:14px;
  background:#fff;color:var(--ink);min-height:40px;
}
select:focus,.txt:focus,input:focus,textarea:focus{outline:2px solid var(--navy-light);outline-offset:1px;}

.btn{
  border-radius:10px;padding:10px 16px;font-weight:600;font-size:14px;
  border:1px solid transparent;display:inline-flex;align-items:center;gap:6px;
  min-height:42px;
}
.btn-primary{background:var(--navy);color:#fff;}
.btn-primary:hover{background:var(--navy-light);}
.btn-gold{background:var(--gold);color:var(--navy-dark);}
.btn-gold:hover{background:#d8b876;}
.btn-outline{background:#fff;border-color:var(--line);color:var(--ink);}
.btn-outline:hover{background:var(--cream);}
.btn-danger{background:#fff;border-color:var(--red);color:var(--red);}
.btn-danger:hover{background:var(--red-light);}
.btn-sm{padding:6px 10px;font-size:12px;min-height:32px;border-radius:8px;}
.btn:disabled{opacity:.45;cursor:not-allowed;}

.chip{
  display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:100px;
  font-size:12.5px;font-weight:600;border:1px solid var(--line);background:#fff;color:var(--ink-soft);
}
.chip.gold{background:var(--gold-light);color:#7A5C1E;border-color:transparent;}
.chip.red{background:var(--red-light);color:var(--red);border-color:transparent;}
.chip.green{background:var(--green-light);color:var(--green);border-color:transparent;}

.badge-dot{width:8px;height:8px;border-radius:50%;display:inline-block;}

/* stat cards on dashboard */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px;}
.stat-card{
  background:#fff;border:1px solid var(--line);border-radius:var(--radius);
  padding:16px;box-shadow:var(--shadow);position:relative;overflow:hidden;
}
.stat-card::before{
  content:"";position:absolute;top:-20px;right:-20px;width:70px;height:70px;border-radius:50%;
  background:var(--cream);
}
.stat-card .num{font-family:'Kanit';font-size:28px;font-weight:700;color:var(--navy-dark);position:relative;}
.stat-card .lbl{font-size:12.5px;color:var(--ink-soft);margin-top:2px;position:relative;}

/* tables */
.tbl-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--line);}
table{border-collapse:collapse;width:100%;font-size:13.5px;background:#fff;}
th,td{padding:9px 11px;text-align:right;border-bottom:1px solid var(--line);white-space:nowrap;}
th{background:var(--navy);color:#fff;font-weight:600;font-family:'Kanit';font-size:12.5px;position:sticky;top:0;}
td.name-cell,th.name-cell{text-align:right;position:sticky;left:0;background:#fff;z-index:2;box-shadow:1px 0 0 var(--line);}
th.name-cell{background:var(--navy);z-index:3;}
tr:nth-child(even) td{background:#FBFAF6;}
tr:nth-child(even) td.name-cell{background:#FBFAF6;}
tr:hover td{background:#F2EEE0;}
tr:hover td.name-cell{background:#F2EEE0;}
td input[type=number]{width:64px;min-height:34px;padding:4px 6px;text-align:center;}

.score-input.warn{border-color:var(--red);background:var(--red-light);}

/* Attendance grid (mobile-first cards) */
.att-list{display:flex;flex-direction:column;gap:8px;}
.att-row{
  display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);
  border-radius:12px;padding:10px 12px;
}
.att-row .idx{width:26px;color:var(--ink-soft);font-size:12px;flex-shrink:0;}
.att-row .who{flex:1;min-width:0;}
.att-row .who .nm{font-weight:600;font-size:14.5px;}
.att-row .who .pct{font-size:11.5px;color:var(--ink-soft);}
.att-row .who .pct.warn{color:var(--red);font-weight:700;}
.status-btns{display:flex;gap:4px;flex-wrap:wrap;}
.st-btn{
  border:1.5px solid var(--line);background:#fff;border-radius:9px;padding:7px 9px;
  font-size:12px;font-weight:700;min-width:38px;min-height:38px;color:var(--ink-soft);
}
.st-btn.on-present{background:var(--green);border-color:var(--green);color:#fff;}
.st-btn.on-absent{background:var(--red);border-color:var(--red);color:#fff;}
.st-btn.on-sick{background:var(--amber);border-color:var(--amber);color:#fff;}
.st-btn.on-personal{background:#7A5C1E;border-color:#7A5C1E;color:#fff;}
.st-btn.on-late{background:var(--navy-light);border-color:var(--navy-light);color:#fff;}
.st-btn.on-other{background:#6B7280;border-color:#6B7280;color:#fff;}
.note-input{width:100%;margin-top:8px;}

/* Behavior */
.beh-row{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:8px;}
.beh-top{display:flex;align-items:center;gap:10px;}
.beh-top .nm{flex:1;font-weight:600;}
.beh-score{font-family:'Kanit';font-weight:700;font-size:18px;min-width:44px;text-align:center;padding:4px 8px;border-radius:8px;}
.beh-score.pos{color:var(--green);background:var(--green-light);}
.beh-score.neg{color:var(--red);background:var(--red-light);}
.beh-score.zero{color:var(--ink-soft);background:var(--cream);}
.reason-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
.reason-chip{
  border:1px solid var(--line);background:var(--cream);border-radius:100px;padding:6px 12px;
  font-size:12px;font-weight:600;color:var(--ink-soft);
}
.reason-chip.plus{color:var(--green);}
.reason-chip.minus{color:var(--red);}
.beh-log{margin-top:8px;font-size:11.5px;color:var(--ink-soft);}
.beh-log .entry{display:flex;justify-content:space-between;padding:3px 0;border-top:1px dashed var(--line);}

/* grade badges */
.grade-pill{font-family:'Kanit';font-weight:700;padding:3px 10px;border-radius:100px;font-size:13px;display:inline-block;}
.g4{background:var(--green-light);color:var(--green);}
.g3{background:#DCEAF3;color:#215E85;}
.g2{background:var(--amber-light);color:var(--amber);}
.g1{background:#F3E4CC;color:#9C5B1F;}
.g0{background:var(--red-light);color:var(--red);}

.empty-state{
  text-align:center;padding:50px 20px;color:var(--ink-soft);
}
.empty-state .ic{font-size:42px;margin-bottom:10px;}

.modal-backdrop{
  position:fixed;inset:0;background:rgba(18,39,71,.45);z-index:100;
  display:flex;align-items:center;justify-content:center;padding:16px;
}
.modal{
  background:#fff;border-radius:16px;padding:22px;max-width:420px;width:100%;
  box-shadow:0 20px 60px rgba(0,0,0,.25);max-height:88vh;overflow-y:auto;
}
.modal h3{margin-top:0;}
.modal-close{position:absolute;}

.toast{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
  background:var(--navy-dark);color:#fff;padding:10px 18px;border-radius:100px;
  font-size:13px;font-weight:600;z-index:200;box-shadow:var(--shadow);
  animation:fadein .2s ease;
}
@media (max-width:860px){.toast{bottom:78px;}}
@keyframes fadein{from{opacity:0;transform:translate(-50%,8px);}to{opacity:1;transform:translate(-50%,0);}}

.subject-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.subject-tab{
  border:1px solid var(--line);background:#fff;border-radius:100px;padding:8px 16px;
  font-size:13.5px;font-weight:600;color:var(--ink-soft);
}
.subject-tab.active{background:var(--gold);color:var(--navy-dark);border-color:var(--gold);}

.class-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.class-tab{
  border:1px solid var(--line);background:#fff;border-radius:9px;padding:8px 14px;
  font-size:13px;font-weight:700;color:var(--navy-dark);
}
.class-tab.active{background:var(--navy);color:#fff;border-color:var(--navy);}

.link-btn{background:none;border:none;color:var(--navy);font-weight:600;font-size:13px;text-decoration:underline;padding:4px 0;}

.roster-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--line);}
.roster-row:last-child{border-bottom:none;}
.roster-row .no{width:26px;color:var(--ink-soft);font-size:12px;}

.progress-bar{height:8px;border-radius:100px;background:var(--cream);overflow:hidden;}
.progress-bar .fill{height:100%;border-radius:100px;}

.hint{font-size:12px;color:var(--ink-soft);}
.section-divider{height:1px;background:var(--line);margin:16px 0;}

.weight-inputs{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
@media(max-width:560px){.weight-inputs{grid-template-columns:1fr;}}

::-webkit-scrollbar{height:8px;width:8px;}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:100px;}

</style>
</head>

function uid(){ return 'x'+Math.random().toString(36).slice(2,10)+Date.now().toString(36).slice(-4); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function fmtDateTH(iso){
  if(!iso) return '';
  const [y,m,d]=iso.split('-').map(Number);
  const months=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return `${d} ${months[m-1]} ${y+543}`;
}
function fullName(s){ return `${s.title}${s.first} ${s.last}`; }
function clamp(n,min,max){ return Math.max(min,Math.min(max,n)); }
function round1(n){ return Math.round(n*10)/10; }

let STATE = null;
let SAVE_TIMER = null;

  attClass: null, attDate: todayStr(),
  scoreSubject: null, scoreClass: null,
  gradeSubject: null, gradeClass: null,
  behClass: null,
  dashClass: null,
};

function defaultState(){
  const roster = JSON.parse(JSON.stringify(window.STUDENTS_DEFAULT || {}));
  return {
    version: 1,
    roster,
    classNames: Object.keys(roster),
    subjects: [],
    assignments: {},
    scores: {},
    attendance: {},
    gradeConfig: {},
    behavior: {},
    settings: { gsheetUrl:'', lastBackup:null },
  };
}

const LS_KEY = 'watamaria-teacher-app-data-v1';
function hasClaudeStorage(){
  return typeof window.storage !== 'undefined' && window.storage && typeof window.storage.get === 'function';
}
async function loadState(){
  let raw = null;
  try{ raw = localStorage.getItem(LS_KEY); }catch(e){ raw = null; }
  if(!raw && hasClaudeStorage()){
    try{ const res = await window.storage.get('app-data', false); if(res && res.value) raw = res.value; }catch(e){}
  }
  try{
    if(raw){
      const parsed = JSON.parse(raw);
      parsed.roster = parsed.roster || defaultState().roster;
      parsed.classNames = parsed.classNames || Object.keys(parsed.roster);
      parsed.subjects = parsed.subjects || [];
      parsed.assignments = parsed.assignments || {};
      parsed.scores = parsed.scores || {};
      parsed.attendance = parsed.attendance || {};
      parsed.gradeConfig = parsed.gradeConfig || {};
      parsed.behavior = parsed.behavior || {};
      parsed.settings = parsed.settings || { gsheetUrl:'', lastBackup:null };
      STATE = parsed;
    } else {
      STATE = defaultState();
    }
  }catch(e){
    STATE = defaultState();
  }
}

function persistNow(){
  const json = JSON.stringify(STATE);
  let ok = false;
  try{ localStorage.setItem(LS_KEY, json); ok = true; }catch(e){ console.error('localStorage save failed', e); }
  if(hasClaudeStorage()){
    try{ window.storage.set('app-data', json, false); }catch(e){ /* ignore, localStorage already covers persistence */ }
  }
  return ok;
}
function saveState(){
  clearTimeout(SAVE_TIMER);
  SAVE_TIMER = setTimeout(()=>{
    const ok = persistNow();
    if(!ok) showToast('บันทึกไม่สำเร็จ — เบราว์เซอร์อาจปิดการใช้งานพื้นที่จัดเก็บข้อมูล');
  }, 200);
}
function flushSaveNow(msg){
  clearTimeout(SAVE_TIMER);
  const ok = persistNow();
  showToast(ok ? (msg || 'บันทึกข้อมูลเรียบร้อยแล้ว ✓') : 'บันทึกไม่สำเร็จ — เบราว์เซอร์อาจปิดการใช้งานพื้นที่จัดเก็บข้อมูล');
}

/* ================= Toast ================= */
function showToast(msg){
  const old = document.querySelector('.toast');
  if(old) old.remove();
  const t = document.createElement('div');
  t.className='toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2200);
}

/* ================= Attendance stats helper ================= */
function attendanceStatsForClass(className){
  const cls = STATE.attendance[className] || {};
  const dates = Object.keys(cls);
  const stats = {}; // studentId -> {total, absent, sick, personal, late, other, present}
  (STATE.roster[className]||[]).forEach(s=>{ stats[s.id] = {total:0,present:0,absent:0,sick:0,personal:0,late:0,other:0}; });
  dates.forEach(d=>{
    const day = cls[d];
    Object.keys(day).forEach(sid=>{
      if(!stats[sid]) return;
      stats[sid].total++;
      const st = day[sid].status;
      if(stats[sid][st]!==undefined) stats[sid][st]++;
    });
  });
  return stats;
}

/* ---- Google Sheet backup ---- */
function setGSheetUrl(val){
  STATE.settings.gsheetUrl = val.trim();
  saveState(); showToast('บันทึก URL แล้ว');
}
async function backupToGoogleSheet(){
  const url = STATE.settings.gsheetUrl;
  if(!url){ showToast('กรุณาใส่ Google Apps Script URL ก่อน'); openGSheetHelpModal(); return; }
  showToast('กำลังส่งข้อมูลสำรอง...');
  try{
    const json = JSON.stringify(STATE);
    const chunkSize = 40000;
    const chunks = [];
    for(let i=0;i<json.length;i+=chunkSize) chunks.push(json.slice(i,i+chunkSize));
    await fetch(url, {
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({ timestamp: new Date().toISOString(), chunks })
    });
    STATE.settings.lastBackup = new Date().toISOString();
    saveState();
    showToast('สำรองข้อมูลไปยัง Google Sheet แล้ว ✓');
    refresh();
  }catch(e){
    console.error(e);
    showToast('ส่งข้อมูลไม่สำเร็จ ตรวจสอบ URL ที่ตั้งค่าไว้');
  }
}
const APPS_SCRIPT_CODE = `function doPost(e) {
  var ss = SpreadsheetApp.getActiveSpreadsheet();
  var sheet = ss.getSheetByName('Backups') || ss.insertSheet('Backups');
  var data = JSON.parse(e.postData.contents);
  var row = [data.timestamp].concat(data.chunks);
  sheet.appendRow(row);
  return ContentService.createTextOutput(JSON.stringify({status:'ok'}))
    .setMimeType(ContentService.MimeType.JSON);
}`;

function importRoster(evt, cls){
  const file = evt.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e)=>{
    try{
      const wb = XLSX.read(e.target.result, {type:'binary'});
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, {header:1, defval:''});
      let added=0;
      const existing = STATE.roster[cls]||(STATE.roster[cls]=[]);
      rows.forEach(r=>{
        if(!r || r.length<2) return;
        const maybeNo = r[0];
        if(typeof maybeNo === 'string' && isNaN(parseInt(maybeNo))) return; // header row
        // Try to guess columns: no, id, title, first, last  OR no,id,name
        let no=r[0], id=r[1], title='', first='', last='';
        if(r.length>=5){ title=r[2]; first=r[3]; last=r[4]; }
        else if(r.length===4){ title=r[2]; const parts=String(r[3]).trim().split(/\s+/); first=parts[0]||''; last=parts.slice(1).join(' '); }
        else return;
        first=String(first).trim(); last=String(last).trim();
        if(!first) return;
        if(existing.some(s=>s.id===String(id))) return;
        existing.push({no:parseInt(no)||existing.length+1, id:String(id), title:String(title).trim(), first, last});
        added++;
      });
      saveState(); showToast(`นำเข้านักเรียนสำเร็จ ${added} คน`); refresh();
    }catch(err){
      reader2CSV(e.target.result, cls);
    }
  };
  reader.readAsBinaryString(file);
  evt.target.value='';
}
function reader2CSV(){ showToast('ไม่สามารถอ่านไฟล์ได้ กรุณาตรวจสอบรูปแบบไฟล์'); }

      const rec = clsData[d][s.id];
      row.push(rec && rec.status ? (statusDef(rec.status)?statusDef(rec.status).short:'') : '');

  const notesRows = [['วันที่','เลขที่','ชื่อ-นามสกุล','สถานะ','หมายเหตุ']];

    <table>
      <thead><tr>
        <th class="name-cell">นักเรียน</th>
        ${assignments.map(a=>`<th>${esc(a.name)}<br><span style="font-weight:400;opacity:.85;">เต็ม ${a.max}</span><br>
          <button class="btn-sm" style="background:var(--gold);color:var(--navy-dark);border:none;border-radius:7px;padding:3px 7px;font-size:11px;margin-top:4px;" onclick="fillSameScore('${subject.id}','${esc(cls)}','${a.id}',${a.max})">🖊️ ใส่คะแนนเดียวกันทั้งหมด</button>
          <button style="background:none;border:none;color:#fff;opacity:.7;cursor:pointer;" title="ลบงานนี้" onclick="deleteAssignment('${subject.id}','${a.id}')">✕</button>
        </th>`).join('')}
        <th>รวม</th>
      </tr></thead>
      <tbody>
      ${roster.map(s=>{
        const srow = scoreData[s.id]||{};
        let sum=0, max=0;
        assignments.forEach(a=>{ max+=a.max; const v=srow[a.id]; if(v!==undefined && v!=='' && v!=='PENDING') sum+=Number(v); });
        return `<tr>
          <td class="name-cell">${s.no}. ${esc(fullName(s))}</td>
          ${assignments.map(a=>{
            const v = srow[a.id];
            if(v==='PENDING'){
              return `<td><button class="chip" style="background:var(--amber-light);color:var(--amber);border:none;" title="คลิกเพื่อกรอกคะแนน" onclick="setScore('${subject.id}','${esc(cls)}','${s.id}','${a.id}','',${a.max})">⏳ ค้างส่ง</button></td>`;
            }
            const val = v!==undefined? v : '';
            return `<td>
              <input type="number" min="0" max="${a.max}" step="0.5" class="score-input" value="${val}" onchange="setScore('${subject.id}','${esc(cls)}','${s.id}','${a.id}',this.value,${a.max})">
              <button title="ทำเครื่องหมายค้างส่งงาน" style="background:none;border:none;color:var(--amber);cursor:pointer;font-size:13px;vertical-align:middle;" onclick="markPending('${subject.id}','${esc(cls)}','${s.id}','${a.id}')">⏳</button>
            </td>`;
          }).join('')}
          <td><b>${sum}/${max}</b></td>
        </tr>`;
      }).join('')}
      </tbody>
    </table>
  </div>` : (roster.length? '' : `<div class="empty-state"><div class="ic">🧑‍🏫</div>ห้อง ${esc(cls)} ยังไม่มีนักเรียน</div>`)}
  `;
}
function fillSameScore(subjectId, cls, asgId, max){
  const val = prompt(`กรอกคะแนนที่ต้องการใส่ให้ทุกคน (เต็ม ${max})`, '');
  if(val===null) return;
  const num = clamp(parseFloat(val)||0, 0, max);
  if(!STATE.scores[subjectId]) STATE.scores[subjectId]={};
  if(!STATE.scores[subjectId][cls]) STATE.scores[subjectId][cls]={};
  (STATE.roster[cls]||[]).forEach(s=>{
    if(!STATE.scores[subjectId][cls][s.id]) STATE.scores[subjectId][cls][s.id]={};
    STATE.scores[subjectId][cls][s.id][asgId] = num;
  });
  saveState(); showToast(`ใส่คะแนน ${num} ให้ทุกคนแล้ว — แก้ไขรายคนได้ตามต้องการ`); refresh();
}
function markPending(subjectId, cls, sid, asgId){
  if(!STATE.scores[subjectId]) STATE.scores[subjectId]={};
  if(!STATE.scores[subjectId][cls]) STATE.scores[subjectId][cls]={};
  if(!STATE.scores[subjectId][cls][sid]) STATE.scores[subjectId][cls][sid]={};
  STATE.scores[subjectId][cls][sid][asgId] = 'PENDING';
  saveState(); refresh();
}
function openAddAssignmentModal(subjectId){
  openModal(`
    <h3>สร้างงาน/แบบทดสอบใหม่</h3>
    <div class="field" style="margin-bottom:12px;"><label>ชื่องาน</label><input class="txt" id="asgName" placeholder="เช่น ใบงานที่ 3, สอบย่อยบทที่ 2"></div>
    <div class="field" style="margin-bottom:16px;"><label>คะแนนเต็ม</label><input class="txt" id="asgMax" type="number" value="10" min="1"></div>
    <div class="row" style="justify-content:flex-end;">
      <button class="btn btn-outline" onclick="closeModal()">ยกเลิก</button>
      <button class="btn btn-primary" onclick="addAssignment('${subjectId}')">บันทึก</button>
    </div>
  `);
}
function addAssignment(subjectId){
  const name = document.getElementById('asgName').value.trim();
  const max = parseFloat(document.getElementById('asgMax').value)||10;
  if(!name){ showToast('กรุณาใส่ชื่องาน'); return; }
  if(!STATE.assignments[subjectId]) STATE.assignments[subjectId]=[];
  STATE.assignments[subjectId].push({id:uid(),name,max});
  saveState(); closeModal(); refresh();
}
function deleteAssignment(subjectId, asgId){
  if(!confirm('ลบงานนี้และคะแนนที่กรอกไว้ทั้งหมด?')) return;
  STATE.assignments[subjectId] = STATE.assignments[subjectId].filter(a=>a.id!==asgId);
  Object.values(STATE.scores[subjectId]||{}).forEach(clsScores=>{
    Object.values(clsScores).forEach(srow=>{ delete srow[asgId]; });
  });
  saveState(); refresh();
}
function setScore(subjectId, cls, sid, asgId, val, max){
  if(!STATE.scores[subjectId]) STATE.scores[subjectId]={};
  if(!STATE.scores[subjectId][cls]) STATE.scores[subjectId][cls]={};
  if(!STATE.scores[subjectId][cls][sid]) STATE.scores[subjectId][cls][sid]={};
  let v = val==='' ? '' : clamp(parseFloat(val)||0, 0, max);
  STATE.scores[subjectId][cls][sid][asgId] = v;
  saveState(); refresh();
}
function exportScores(subjectId, cls){
  const subject = STATE.subjects.find(s=>s.id===subjectId);
  const assignments = STATE.assignments[subjectId]||[];
  const roster = STATE.roster[cls]||[];
  const scoreData = (STATE.scores[subjectId]||{})[cls]||{};
  const rows = [['เลขที่','รหัสประจำตัว','ชื่อ-นามสกุล', ...assignments.map(a=>`${a.name} (เต็ม ${a.max})`), 'รวม']];
  roster.forEach(s=>{
    const srow = scoreData[s.id]||{};
    let sum=0;
    const cells = assignments.map(a=>{
      const v=srow[a.id];
      if(v==='PENDING') return 'ค้างส่ง';
      if(v!==undefined&&v!=='') sum+=Number(v);
      return v===undefined?'':v;
    });
    rows.push([s.no, s.id, fullName(s), ...cells, sum]);
  });
  const ws = XLSX.utils.aoa_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, cls.replace(/[\/\\?*\[\]]/g,'-'));
  XLSX.writeFile(wb, `คะแนน_${subject.name}_${cls}.xlsx`.replace(/\//g,'-'));
}

/* =================================================================
   PAGE: GRADES (midterm/final + weighting)
   ================================================================= */
function pageGrades(){
  if(STATE.subjects.length===0){
    return `<div class="page-head"><div><h1>คะแนนรวมและตัดเกรด</h1></div></div>
    <div class="empty-state"><div class="ic">📊</div>ยังไม่มีรายวิชา<br><button class="btn btn-primary" style="margin-top:14px;" onclick="goTab('scores')">ไปเพิ่มรายวิชาที่หน้าเก็บคะแนน</button></div>`;
  }
  if(!UI.gradeSubject || !STATE.subjects.find(s=>s.id===UI.gradeSubject)) UI.gradeSubject = STATE.subjects[0].id;
  const subject = STATE.subjects.find(s=>s.id===UI.gradeSubject);
  if(!UI.gradeClass || !subject.classes.includes(UI.gradeClass)) UI.gradeClass = subject.classes[0];
  const cls = UI.gradeClass;
  const roster = STATE.roster[cls]||[];

  if(!STATE.gradeConfig[subject.id]) STATE.gradeConfig[subject.id]={};
  if(!STATE.gradeConfig[subject.id][cls]) STATE.gradeConfig[subject.id][cls] = {collectW:50, midW:20, finalW:30, midMax:20, finalMax:30, midScores:{}, finalScores:{}};
  const cfg = STATE.gradeConfig[subject.id][cls];

  const assignments = STATE.assignments[subject.id]||[];
  const scoreData = ((STATE.scores[subject.id]||{})[cls])||{};
  const asgMaxSum = assignments.reduce((a,x)=>a+x.max,0);

  const weightSum = Number(cfg.collectW)+Number(cfg.midW)+Number(cfg.finalW);

  return `
  <div class="page-head">
    <div><h1>คะแนนรวมและตัดเกรด</h1><div class="desc">กำหนดสัดส่วนคะแนน แล้วระบบคำนวณเกรดให้อัตโนมัติ — เหมาะสำหรับใช้บนคอมพิวเตอร์</div></div>
    <div class="row">
      <button class="btn btn-outline" onclick="exportGrades('${subject.id}','${esc(cls)}')">📤 Export Excel</button>
      <button class="btn btn-primary" onclick="flushSaveNow()">💾 บันทึก</button>
    </div>
  </div>

  <div class="subject-tabs">
    ${STATE.subjects.map(s=>`<button class="subject-tab ${s.id===subject.id?'active':''}" onclick="UI.gradeSubject='${s.id}';UI.gradeClass=null;refresh();">${esc(s.name)}</button>`).join('')}
  </div>
  <div class="class-tabs">
    ${subject.classes.map(c=>`<button class="class-tab ${c===cls?'active':''}" onclick="UI.gradeClass='${esc(c)}';refresh();">${esc(c)}</button>`).join('')}
  </div>

  <div class="card">
    <h3>สัดส่วนคะแนน (รวมต้องเท่ากับ 100%)</h3>
    <div class="weight-inputs">
      <div class="field"><label>คะแนนเก็บ % (ปัจจุบันเก็บได้ ${asgMaxSum} คะแนนจาก ${assignments.length} งาน)</label>
        <input class="txt" type="number" value="${cfg.collectW}" onchange="setGradeCfg('${subject.id}','${esc(cls)}','collectW',this.value)"></div>
      <div class="field"><label>สอบกลางภาค % (คะแนนเต็ม)</label>
        <div class="row"><input class="txt" type="number" style="width:70px" value="${cfg.midW}" onchange="setGradeCfg('${subject.id}','${esc(cls)}','midW',this.value)">
        <input class="txt" type="number" style="width:70px" value="${cfg.midMax}" onchange="setGradeCfg('${subject.id}','${esc(cls)}','midMax',this.value)"></div></div>
      <div class="field"><label>สอบปลายภาค % (คะแนนเต็ม)</label>
        <div class="row"><input class="txt" type="number" style="width:70px" value="${cfg.finalW}" onchange="setGradeCfg('${subject.id}','${esc(cls)}','finalW',this.value)">
        <input class="txt" type="number" style="width:70px" value="${cfg.finalMax}" onchange="setGradeCfg('${subject.id}','${esc(cls)}','finalMax',this.value)"></div></div>
    </div>
    ${weightSum!==100? `<div class="hint" style="color:var(--red);margin-top:8px;">⚠️ สัดส่วนรวมตอนนี้ ${weightSum}% (ควรรวมเป็น 100%)</div>`:`<div class="hint" style="color:var(--green);margin-top:8px;">✓ สัดส่วนรวม 100%</div>`}
  </div>

  <div class="card" style="padding:0;">
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th class="name-cell">นักเรียน</th>
          <th>คะแนนเก็บ<br><span style="font-weight:400;">(${cfg.collectW}%)</span></th>
          <th>กลางภาค /${cfg.midMax}</th>
          <th>ปลายภาค /${cfg.finalMax}</th>
          <th>รวม (100)</th>
          <th>เกรด</th>
        </tr></thead>
        <tbody>
        ${roster.map(s=>{
          const srow = scoreData[s.id]||{};
          let collectSum=0, collectMaxDone=0;
          assignments.forEach(a=>{
            const v=srow[a.id];
            if(v!==undefined && v!=='' && v!=='PENDING'){ collectSum+=Number(v); collectMaxDone+=a.max; }
          });
          const collectPct = collectMaxDone>0 ? (collectSum/collectMaxDone)*Number(cfg.collectW) : 0;
          const mid = cfg.midScores[s.id]!==undefined? Number(cfg.midScores[s.id]) : '';
          const fin = cfg.finalScores[s.id]!==undefined? Number(cfg.finalScores[s.id]) : '';
          const midPct = mid!==''&&cfg.midMax>0 ? (mid/cfg.midMax)*Number(cfg.midW) : 0;
          const finPct = fin!==''&&cfg.finalMax>0 ? (fin/cfg.finalMax)*Number(cfg.finalW) : 0;
          const total = round1(collectPct+midPct+finPct);
          const g = gradeFor(total);
          return `<tr>
            <td class="name-cell">${s.no}. ${esc(fullName(s))}</td>
            <td>${round1(collectPct)} <span class="hint">(${collectSum}/${collectMaxDone||0} ที่ให้คะแนนแล้ว)</span></td>
            <td><input type="number" min="0" max="${cfg.midMax}" class="score-input" value="${mid}" onchange="setMidFinal('${subject.id}','${esc(cls)}','mid','${s.id}',this.value,${cfg.midMax})"></td>
            <td><input type="number" min="0" max="${cfg.finalMax}" class="score-input" value="${fin}" onchange="setMidFinal('${subject.id}','${esc(cls)}','final','${s.id}',this.value,${cfg.finalMax})"></td>
            <td><b>${total}</b></td>
            <td><span class="grade-pill ${g.css}" title="${g.label}">${g.grade}</span></td>
          </tr>`;
        }).join('') || `<tr><td colspan="6" style="text-align:center;padding:20px;color:var(--ink-soft);">ยังไม่มีนักเรียนในห้องนี้</td></tr>`}
        </tbody>
      </table>
    </div>
  </div>
  <div class="card">
    <h3 style="margin-bottom:8px;">เกณฑ์การตัดเกรด</h3>
    <div class="row">
      ${GRADE_TABLE.map(g=>`<span class="grade-pill ${g.css}">${g.grade} = ${g.min}%${g.min===80?'+':' ขึ้นไป'} ${g.label}</span>`).join('')}
    </div>
  </div>
  `;
}
function setGradeCfg(subjectId, cls, key, val){
  STATE.gradeConfig[subjectId][cls][key] = parseFloat(val)||0;
  saveState(); refresh();
}
function setMidFinal(subjectId, cls, which, sid, val, max){
  const cfg = STATE.gradeConfig[subjectId][cls];
  const target = which==='mid' ? cfg.midScores : cfg.finalScores;
  if(val===''){ delete target[sid]; } else { target[sid] = clamp(parseFloat(val)||0,0,max); }
  saveState(); refresh();
}
function exportGrades(subjectId, cls){
  const subject = STATE.subjects.find(s=>s.id===subjectId);
  const cfg = STATE.gradeConfig[subjectId][cls];
  const assignments = STATE.assignments[subjectId]||[];
  const asgMaxSum = assignments.reduce((a,x)=>a+x.max,0);
  const scoreData = ((STATE.scores[subjectId]||{})[cls])||{};
  const roster = STATE.roster[cls]||[];
  const rows = [['เลขที่','รหัสประจำตัว','ชื่อ-นามสกุล',`คะแนนเก็บ (${cfg.collectW}%)`,`กลางภาค /${cfg.midMax}`,`ปลายภาค /${cfg.finalMax}`,'รวม (100)','เกรด']];
  roster.forEach(s=>{
    const srow = scoreData[s.id]||{};
    let collectSum=0, collectMaxDone=0;
    assignments.forEach(a=>{ const v=srow[a.id]; if(v!==undefined&&v!==''&&v!=='PENDING'){ collectSum+=Number(v); collectMaxDone+=a.max; } });
    const collectPct = collectMaxDone>0 ? (collectSum/collectMaxDone)*Number(cfg.collectW) : 0;
    const mid = cfg.midScores[s.id]!==undefined? Number(cfg.midScores[s.id]) : '';
    const fin = cfg.finalScores[s.id]!==undefined? Number(cfg.finalScores[s.id]) : '';
    const midPct = mid!==''&&cfg.midMax>0 ? (mid/cfg.midMax)*Number(cfg.midW) : 0;
    const finPct = fin!==''&&cfg.finalMax>0 ? (fin/cfg.finalMax)*Number(cfg.finalW) : 0;
    const total = round1(collectPct+midPct+finPct);
    const g = gradeFor(total);
    rows.push([s.no, s.id, fullName(s), round1(collectPct), mid, fin, total, g.grade]);
  });
  const ws = XLSX.utils.aoa_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, cls.replace(/[\/\\?*\[\]]/g,'-'));
  XLSX.writeFile(wb, `ตัดเกรด_${subject.name}_${cls}.xlsx`.replace(/\//g,'-'));
}

/* =================================================================
   PAGE: BEHAVIOR
   ================================================================= */
function pageBehavior(){
  if(!UI.behClass) UI.behClass = STATE.classNames[0];
  const cls = UI.behClass;
  const roster = STATE.roster[cls]||[];
  if(!STATE.behavior[cls]) STATE.behavior[cls]={};

  return `
  <div class="page-head">
    <div><h1>พฤติกรรมและการทำความดี</h1><div class="desc">บันทึกคะแนนจิตพิสัยด้วยหลักฐาน ไม่ต้องใช้ความรู้สึก</div></div>
    <button class="btn btn-primary" onclick="flushSaveNow()">💾 บันทึก</button>
  </div>
  <div class="class-tabs">
    ${STATE.classNames.map(c=>`<button class="class-tab ${c===cls?'active':''}" onclick="UI.behClass='${esc(c)}';refresh();">${esc(c)}</button>`).join('')}
  </div>

  ${roster.map(s=>{
    const log = STATE.behavior[cls][s.id]||[];
    const total = log.reduce((a,e)=>a+e.delta,0);
    const cls2 = total>0?'pos':(total<0?'neg':'zero');
    return `<div class="beh-row">
      <div class="beh-top">
        <div class="nm">${s.no}. ${esc(fullName(s))}</div>
        <div class="beh-score ${cls2}">${total>0?'+':''}${total}</div>
      </div>
      <div class="reason-chips">
        ${BEHAVIOR_REASONS.map(r=>`<button class="reason-chip ${r.delta>0?'plus':'minus'}" onclick="addBehavior('${esc(cls)}','${s.id}','${esc(r.label)}',${r.delta})">${r.delta>0?'+':''}${r.delta} ${esc(r.label)}</button>`).join('')}
        <button class="reason-chip" onclick="openCustomBehaviorModal('${esc(cls)}','${s.id}')">✏️ อื่นๆ...</button>
      </div>
      ${log.length? `<div class="beh-log">${log.slice().reverse().slice(0,5).map(e=>`<div class="entry"><span>${e.delta>0?'+':''}${e.delta} ${esc(e.reason)}</span><span>${fmtDateTH(e.date)} <button class="link-btn" style="padding:0;" onclick="removeBehavior('${esc(cls)}','${s.id}','${e.id}')">ลบ</button></span></div>`).join('')}</div>` : ''}
    </div>`;
  }).join('') || `<div class="empty-state"><div class="ic">⭐</div>ห้อง ${esc(cls)} ยังไม่มีนักเรียน</div>`}
  `;
}
function addBehavior(cls, sid, reason, delta){
  if(!STATE.behavior[cls]) STATE.behavior[cls]={};
  if(!STATE.behavior[cls][sid]) STATE.behavior[cls][sid]=[];
  STATE.behavior[cls][sid].push({id:uid(), reason, delta, date:todayStr()});
  saveState(); refresh();
}
function removeBehavior(cls, sid, entryId){
  STATE.behavior[cls][sid] = STATE.behavior[cls][sid].filter(e=>e.id!==entryId);
  saveState(); refresh();
}
function openCustomBehaviorModal(cls, sid){
  openModal(`
    <h3>บันทึกพฤติกรรมอื่นๆ</h3>
    <div class="field" style="margin-bottom:12px;"><label>รายละเอียด</label><input class="txt" id="behReason" placeholder="ระบุพฤติกรรม"></div>
    <div class="field" style="margin-bottom:16px;"><label>คะแนน (+ หรือ -)</label><input class="txt" id="behDelta" type="number" value="1"></div>
    <div class="row" style="justify-content:flex-end;">
      <button class="btn btn-outline" onclick="closeModal()">ยกเลิก</button>
      <button class="btn btn-primary" onclick="submitCustomBehavior('${esc(cls)}','${sid}')">บันทึก</button>
    </div>
  `);
}
function submitCustomBehavior(cls, sid){
  const reason = document.getElementById('behReason').value.trim();
  const delta = parseFloat(document.getElementById('behDelta').value)||0;
  if(!reason){ showToast('กรุณาระบุรายละเอียด'); return; }
  addBehavior(cls, sid, reason, delta);
  closeModal();
}

/* ================= Modal ================= */
function openModal(html){
  const bd = document.createElement('div');
  bd.className='modal-backdrop'; bd.id='modalBackdrop';
  bd.onclick=(e)=>{ if(e.target===bd) closeModal(); };
  bd.innerHTML = `<div class="modal">${html}</div>`;
  document.body.appendChild(bd);
}
function closeModal(){ const m=document.getElementById('modalBackdrop'); if(m) m.remove(); }

/* ================= Init ================= */
async function init(){
  document.getElementById('app').innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#1B3A6B;font-family:'Kanit';">กำลังโหลดข้อมูล...</div>`;
  await loadState();
  renderShell();
}
init();

</script>
</body>
</html>
